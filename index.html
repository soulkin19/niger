<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Simple Tank Strategy</title>
    <style>
        :root { --cell: 55px; --red: #ff5e57; --blue: #1e90ff; --bg: #1e272e; }
        body { font-family: sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        
        #status { font-size: 1.5rem; font-weight: bold; margin-bottom: 15px; padding: 10px 30px; border-radius: 50px; transition: 0.3s; }
        .red-turn { background: #4b1a1a; color: var(--red); border: 2px solid var(--red); }
        .blue-turn { background: #1a2a4b; color: var(--blue); border: 2px solid var(--blue); }

        #container { display: flex; gap: 20px; }
        #board { display: grid; grid-template-columns: repeat(10, var(--cell)); grid-template-rows: repeat(10, var(--cell)); background: #2f3542; border: 4px solid #57606f; }
        
        .cell { width: var(--cell); height: var(--cell); display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.05); box-sizing: border-box; cursor: pointer; position: relative; }
        .cell:hover { background: rgba(255,255,255,0.1); }
        .repair-zone { background: #3d424d; }
        .repair-zone::after { content: '⚙️'; opacity: 0.2; font-size: 30px; position: absolute; }

        /* 範囲表示 */
        .movable::after { content: ''; width: 30%; height: 30%; background: rgba(255,255,0,0.4); border-radius: 50%; }
        .attackable::after { content: ''; width: 80%; height: 80%; border: 3px solid rgba(255,50,50,0.6); border-radius: 10%; }

        /* 戦車 */
        .tank { width: 80%; height: 80%; border-radius: 5px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; z-index: 2; transition: 0.2s; position: relative; }
        .tank.red { background: var(--red); box-shadow: 0 4px 0 #b33939; }
        .tank.blue { background: var(--blue); box-shadow: 0 4px 0 #0984e3; }
        .tank.acted { opacity: 0.4; filter: grayscale(1); transform: scale(0.9); }
        .tank.selected { outline: 4px solid yellow; transform: scale(1.1) translateY(-5px); z-index: 10; }
        
        .hp-bar { position: absolute; bottom: 0; left: 0; width: 100%; height: 5px; background: black; }
        .hp-fill { height: 100%; background: #2ecc71; transition: 0.3s; }

        #panel { width: 250px; background: #2f3542; padding: 20px; border-radius: 10px; border: 1px solid #57606f; }
        button { width: 100%; padding: 15px; font-weight: bold; background: #ffa502; border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; color: #2f3542; }
        button:hover { background: #eccc68; }
        #log { margin-top: 20px; font-size: 13px; height: 200px; overflow-y: auto; color: #a4b0be; }
    </style>
</head>
<body>

<div id="status" class="red-turn">PLAYER TURN</div>

<div id="container">
    <div id="board"></div>

    <div id="panel">
        <div style="display:flex; justify-content: space-between; margin-bottom: 10px;">
            <span>味方: <b id="r-count" style="color:var(--red)">10</b></span>
            <span>敵軍: <b id="b-count" style="color:var(--blue)">10</b></span>
        </div>
        <button onclick="endTurn()">ターン終了</button>
        <div id="log"><div>--- 戦闘開始 ---</div></div>
    </div>
</div>

<script>
const SIZE = 10;
const board = document.getElementById('board');
const logEl = document.getElementById('log');

// 共通ステータス
const STATS = { hp: 20, atk: 5, range: 3, move: 2, heal: 6 };

let units = [];
let selected = null;
let turn = 'red';
let gameOver = false;

function init() {
    units = [];
    for(let i=0; i<10; i++) {
        // Red: 下2列に配置
        units.push({ team: 'red', x: i, y: (i%2 === 0 ? 9 : 8), hp: STATS.hp, acted: false });
        // Blue: 上2列に配置
        units.push({ team: 'blue', x: i, y: (i%2 === 0 ? 0 : 1), hp: STATS.hp, acted: false });
    }
    render();
}

function render() {
    board.innerHTML = '';
    
    // カウント更新
    const rCount = units.filter(u => u.team === 'red').length;
    const bCount = units.filter(u => u.team === 'blue').length;
    document.getElementById('r-count').innerText = rCount;
    document.getElementById('b-count').innerText = bCount;

    if (rCount === 0 || bCount === 0) return endGame(rCount > 0 ? 'red' : 'blue');

    for (let y = 0; y < SIZE; y++) {
        for (let x = 0; x < SIZE; x++) {
            const cell = document.createElement('div');
            // 修理ゾーン（上端と下端の端を除く中央4マス）
            const isRepair = (y === 0 || y === 9) && (x >= 3 && x <= 6);
            cell.className = `cell ${isRepair ? 'repair-zone' : ''}`;
            
            const unit = units.find(u => u.x === x && u.y === y);
            if (unit) {
                const uEl = document.createElement('div');
                uEl.className = `tank ${unit.team} ${selected === unit ? 'selected' : ''} ${unit.acted ? 'acted' : ''}`;
                uEl.innerHTML = `<span>🚜</span><div class="hp-bar"><div class="hp-fill" style="width:${(unit.hp/STATS.hp)*100}%"></div></div>`;
                cell.appendChild(uEl);
            }

            // 操作ガイド
            if (selected && !selected.acted && turn === 'red') {
                const dist = Math.abs(selected.x - x) + Math.abs(selected.y - y);
                if (dist > 0 && dist <= STATS.move && !unit) cell.classList.add('movable');
                if (unit && unit.team !== selected.team && dist <= STATS.range) cell.classList.add('attackable');
            }

            cell.onclick = () => handleCell(x, y);
            board.appendChild(cell);
        }
    }
}

function handleCell(x, y) {
    if (turn !== 'red' || gameOver) return;
    const clicked = units.find(u => u.x === x && u.y === y);

    if (clicked && clicked.team === 'red' && !clicked.acted) {
        selected = clicked;
        render();
        return;
    }

    if (selected) {
        const dist = Math.abs(selected.x - x) + Math.abs(selected.y - y);
        // 攻撃
        if (clicked && clicked.team === 'blue' && dist <= STATS.range) {
            executeAttack(selected, clicked);
            selected = null;
            render();
        } 
        // 移動
        else if (!clicked && dist <= STATS.move) {
            selected.x = x;
            selected.y = y;
            selected.acted = true;
            selected = null;
            render();
        }
    }
}

function executeAttack(attacker, defender) {
    // 連携ボーナス計算：防御側の射程内にいる攻撃側の仲間の数
    const supporters = units.filter(u => 
        u.team === attacker.team && 
        u !== attacker && 
        (Math.abs(u.x - defender.x) + Math.abs(u.y - defender.y) <= STATS.range)
    );

    const dmg = STATS.atk + supporters.length;
    defender.hp -= dmg;
    attacker.acted = true;

    addLog(`${attacker.team.toUpperCase()}の攻撃：${dmg}ダメージ！ (連携+${supporters.length})`, attacker.team);

    if (defender.hp <= 0) {
        units = units.filter(u => u !== defender);
        addLog(`☠️ 戦車を撃破した！`, 'system');
    }
}

function addLog(msg, type) {
    const div = document.createElement('div');
    div.style.color = type === 'red' ? 'var(--red)' : (type === 'blue' ? 'var(--blue)' : '#f1c40f');
    div.innerText = msg;
    logEl.prepend(div);
}

function endTurn() {
    if (gameOver) return;
    selected = null;

    // 修理回復
    units.forEach(u => {
        const isRepair = (u.y === 0 || u.y === 9) && (u.x >= 3 && u.x <= 6);
        if (isRepair && u.hp < STATS.hp) {
            u.hp = Math.min(STATS.hp, u.hp + STATS.heal);
            addLog(`⚙️ 修理完了 (HP+${STATS.heal})`, 'system');
        }
        u.acted = false;
    });

    if (turn === 'red') {
        turn = 'blue';
        document.getElementById('status').innerText = "ENEMY TURN";
        document.getElementById('status').className = "blue-turn";
        setTimeout(aiTurn, 600);
    } else {
        turn = 'red';
        document.getElementById('status').innerText = "PLAYER TURN";
        document.getElementById('status').className = "red-turn";
    }
    render();
}

function aiTurn() {
    if (gameOver) return;
    const aiUnits = units.filter(u => u.team === 'blue');
    
    aiUnits.forEach((u, i) => {
        setTimeout(() => {
            if (!units.includes(u)) return;

            const targets = units.filter(t => t.team === 'red');
            let bestTarget = null;
            let minDist = 99;

            targets.forEach(t => {
                const d = Math.abs(u.x - t.x) + Math.abs(u.y - t.y);
                if (d < minDist) { minDist = d; bestTarget = t; }
            });

            if (bestTarget) {
                if (minDist <= STATS.range) {
                    executeAttack(u, bestTarget);
                } else {
                    // 近づく
                    if (u.x < bestTarget.x) u.x++;
                    else if (u.x > bestTarget.x) u.x--;
                    else if (u.y < bestTarget.y) u.y++;
                    u.acted = true;
                }
            }
            render();
            if (i === aiUnits.length - 1) setTimeout(endTurn, 500);
        }, i * 100);
    });
}

function endGame(winner) {
    gameOver = true;
    const msg = winner === 'red' ? "VICTORY!" : "DEFEAT...";
    document.getElementById('status').innerText = msg;
    alert(winner === 'red' ? "あなたの勝利です！" : "敗北しました...");
}

init();
</script>
</body>
</html>
