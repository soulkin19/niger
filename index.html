<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Minimal War Game</title>
    <style>
        :root { --cell-size: 50px; }
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #222; color: white; }
        #game-board { 
            display: grid; 
            grid-template-columns: repeat(10, var(--cell-size)); 
            grid-template-rows: repeat(10, var(--cell-size)); 
            gap: 2px; border: 2px solid #555; background: #444;
        }
        .cell { 
            width: var(--cell-size); height: var(--cell-size); 
            background: #333; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; font-size: 20px;
        }
        .cell:hover { background: #444; }
        .unit { border-radius: 50%; width: 80%; height: 80%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; }
        .red { background: #ff4d4d; color: white; border: 2px solid #800; }
        .blue { background: #4d4dff; color: white; border: 2px solid #008; }
        .selected { outline: 3px solid yellow; z-index: 10; }
        #ui { margin: 20px; text-align: center; }
        .status { font-size: 1.2rem; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="status">手番: <span id="turn-display" style="color: #ff4d4d;">赤軍</span></div>
        <div id="msg">ユニットを選択してください</div>
    </div>

    <div id="game-board"></div>

<script>
    const BOARD_SIZE = 10;
    const boardElement = document.getElementById('game-board');
    const turnDisplay = document.getElementById('turn-display');
    const msgDisplay = document.getElementById('msg');

    let turn = 'red';
    let selectedUnit = null;
    let units = [
        { id: 1, team: 'red', type: '歩兵', x: 0, y: 0, hp: 10 },
        { id: 2, team: 'red', type: '戦車', x: 0, y: 1, hp: 20 },
        { id: 3, team: 'blue', type: '歩兵', x: 9, y: 9, hp: 10 },
        { id: 4, team: 'blue', type: '戦車', x: 9, y: 8, hp: 20 }
    ];

    function initBoard() {
        boardElement.innerHTML = '';
        for (let y = 0; y < BOARD_SIZE; y++) {
            for (let x = 0; x < BOARD_SIZE; x++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.x = x;
                cell.dataset.y = y;
                cell.onclick = () => handleCellClick(x, y);
                
                const unit = units.find(u => u.x === x && u.y === y);
                if (unit) {
                    const unitEl = document.createElement('div');
                    unitEl.className = `unit ${unit.team} ${selectedUnit === unit ? 'selected' : ''}`;
                    unitEl.innerText = unit.type;
                    cell.appendChild(unitEl);
                }
                boardElement.appendChild(cell);
            }
        }
    }

    function handleCellClick(x, y) {
        const clickedUnit = units.find(u => u.x === x && u.y === y);

        // ユニット選択
        if (clickedUnit && clickedUnit.team === turn) {
            selectedUnit = clickedUnit;
            msgDisplay.innerText = `${clickedUnit.type}を選択中（移動先を選んでください）`;
            initBoard();
            return;
        }

        // 移動または攻撃
        if (selectedUnit) {
            const dist = Math.abs(selectedUnit.x - x) + Math.abs(selectedUnit.y - y);
            
            if (dist === 1) { // 隣接マスのみ行動可能
                if (clickedUnit && clickedUnit.team !== turn) {
                    // 攻撃
                    clickedUnit.hp -= 5;
                    msgDisplay.innerText = `攻撃！ 敵のHP: ${clickedUnit.hp}`;
                    if (clickedUnit.hp <= 0) {
                        units = units.filter(u => u !== clickedUnit);
                        msgDisplay.innerText = "敵を撃破！";
                    }
                    endTurn();
                } else if (!clickedUnit) {
                    // 移動
                    selectedUnit.x = x;
                    selectedUnit.y = y;
                    endTurn();
                }
            }
        }
    }

    function endTurn() {
        selectedUnit = null;
        turn = turn === 'red' ? 'blue' : 'red';
        turnDisplay.innerText = turn === 'red' ? '赤軍' : '青軍';
        turnDisplay.style.color = turn === 'red' ? '#ff4d4d' : '#4d4dff';
        initBoard();
    }

    initBoard();
</script>
</body>
</html>
