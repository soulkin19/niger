<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Advanced Tank Tactics</title>
    <style>
        :root { --cell: 55px; --red: #ff5e57; --blue: #1e90ff; --bg: #1a1a1d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        
        #header { display: flex; align-items: center; gap: 20px; margin-bottom: 15px; }
        #status { font-size: 1.2rem; font-weight: bold; padding: 8px 25px; border-radius: 5px; min-width: 150px; text-align: center; }
        .red-turn { background: var(--red); color: white; box-shadow: 0 0 15px var(--red); }
        .blue-turn { background: var(--blue); color: white; box-shadow: 0 0 15px var(--blue); }

        #container { display: flex; gap: 20px; }
        #board { display: grid; grid-template-columns: repeat(10, var(--cell)); grid-template-rows: repeat(10, var(--cell)); background: #2c3e50; border: 4px solid #34495e; position: relative; }
        
        .cell { width: var(--cell); height: var(--cell); display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.05); box-sizing: border-box; cursor: pointer; position: relative; }
        .cell:hover { background: rgba(255,255,255,0.1); }
        .repair { background: #27ae6066; } /* 修理マス */
        .repair::after { content: '⚙️'; opacity: 0.3; font-size: 24px; position: absolute; }

        /* 範囲ガイド */
        .movable::after { content: ''; width: 30%; height: 30%; background: rgba(255,255,0,0.5); border-radius: 50%; }
        .attackable::after { content: ''; width: 80%; height: 80%; border: 3px solid rgba(255,50,50,0.8); border-radius: 5px; }

        .tank { width: 80%; height: 80%; border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; z-index: 2; transition: 0.2s; position: relative; }
        .tank.red { background: var(--red); border-bottom: 4px solid #b33939; }
        .tank.blue { background: var(--blue); border-bottom: 4px solid #0984e3; }
        .tank.acted { opacity: 0.5; filter: saturate(0.5); }
        .tank.selected { transform: scale(1.15); box-shadow: 0 0 20px yellow; z-index: 10; }
        
        .hp-bar { position: absolute; top: -10px; left: 0; width: 100%; height: 4px; background: #000; border: 1px solid #555; }
        .hp-fill { height: 100%; background: #2ecc71; }

        #panel { width: 280px; background: #2c3e50; padding: 20px; border-radius: 10px; }
        .guage-container { height: 20px; background: #111; border-radius: 10px; margin: 15px 0; overflow: hidden; border: 1px solid #555; }
        #fever-guage { height: 100%; width: 0%; background: linear-gradient(90deg, #f1c40f, #e67e22); transition: 0.3s; }
        
        button { width: 100%; padding: 12px; font-weight: bold; background: #ecf0f1; border: none; border-radius: 5px; cursor: pointer; color: #2c3e50; font-size: 1rem; }
        button:hover { background: #bdc3c7; }
        #log { margin-top: 15px; font-size: 12px; height: 180px; overflow-y: auto; color: #ecf0f1; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 5px; }
    </style>
</head>
<body>

<div id="header">
    <div id="status" class="red-turn">PLAYER TURN</div>
    <div style="font-size: 0.9rem;">一斉射撃ゲージ: <span id="guage-val">0</span>%</div>
</div>

<div id="container">
    <div id="board"></div>

    <div id="panel">
        <div class="guage-container"><div id="fever-guage"></div></div>
        <div style="display:flex; justify-content: space-between; margin-bottom: 10px; font-weight:bold;">
            <span style="color:var(--red)">RED: <span id="r-count">10</span></span>
            <span style="color:var(--blue)">BLUE: <span id="b-count">10</span></span>
        </div>
        <button onclick="endTurn()">ターン終了</button>
        <div id="log">--- 作戦開始 ---</div>
    </div>
</div>

<script>
const SIZE = 10;
const STATS = { hp: 20, atk: 5, range: 3, move: 2 };
let units = [];
let selected = null;
let turn = 'red';
let feverEnergy = 0;
let isFever = false;

function init() {
    units = [];
    for(let i=0; i<10; i++) {
        units.push({ id: 'r'+i, team: 'red', x: i, y: 9, hp: STATS.hp, acted: false });
        units.push({ id: 'b'+i, team: 'blue', x: i, y: 0, hp: STATS.hp, acted: false });
    }
    render();
}

function render() {
    const board = document.getElementById('board');
    board.innerHTML = '';
    
    document.getElementById('r-count').innerText = units.filter(u => u.team === 'red').length;
    document.getElementById('b-count').innerText = units.filter(u => u.team === 'blue').length;

    for (let y = 0; y < SIZE; y++) {
        for (let x = 0; x < SIZE; x++) {
            const cell = document.createElement('div');
            const isRepair = (y === 0 || y === 9) && (x >= 4 && x <= 5);
            cell.className = `cell ${isRepair ? 'repair' : ''}`;
            
            const unit = units.find(u => u.x === x && u.y === y);
            if (unit) {
                const uEl = document.createElement('div');
                uEl.className = `tank ${unit.team} ${selected === unit ? 'selected' : ''} ${unit.acted ? 'acted' : ''}`;
                uEl.innerHTML = `<span>🚜</span><div class="hp-bar"><div class="hp-fill" style="width:${(unit.hp/STATS.hp)*100}%"></div></div>`;
                cell.appendChild(uEl);
            }

            if (selected && !selected.acted && turn === 'red') {
                const dist = Math.abs(selected.x - x) + Math.abs(selected.y - y);
                const currentRange = isFever ? STATS.range + 2 : STATS.range;
                
                // 移動可能（他ユニットがいるマスは不可）
                if (dist > 0 && dist <= STATS.move && !unit) cell.classList.add('movable');
                // 攻撃可能
                if (unit && unit.team !== selected.team && dist <= currentRange) cell.classList.add('attackable');
            }

            cell.onclick = () => handleCell(x, y);
            board.appendChild(cell);
        }
    }
}

function handleCell(x, y) {
    if (turn !== 'red') return;
    const clicked = units.find(u => u.x === x && u.y === y);

    if (clicked && clicked.team === 'red' && !clicked.acted) {
        selected = clicked;
        render();
        return;
    }

    if (selected) {
        const dist = Math.abs(selected.x - x) + Math.abs(selected.y - y);
        const currentRange = isFever ? STATS.range + 2 : STATS.range;

        if (clicked && clicked.team === 'blue' && dist <= currentRange) {
            attack(selected, clicked);
            selected.acted = true;
            selected = null;
        } else if (!clicked && dist <= STATS.move) {
            selected.x = x;
            selected.y = y;
            selected.acted = true;
            selected = null;
        }
        render();
    }
}

function attack(attacker, defender) {
    // 背面ボーナス（Redは下から上、Blueは上から下へ攻める前提）
    let bonus = 0;
    if (attacker.team === 'red' && attacker.y < defender.y) bonus += 2; // 背後から
    if (attacker.team === 'blue' && attacker.y > defender.y) bonus += 2;

    const dmg = STATS.atk + bonus;
    defender.hp -= dmg;
    
    // ゲージ増加
    feverEnergy = Math.min(100, feverEnergy + 15);
    updateGuage();

    addLog(`${attacker.team}の攻撃: ${dmg}ダメ${bonus ? ' (背面!)' : ''}`, attacker.team);

    if (defender.hp <= 0) {
        units = units.filter(u => u !== defender);
        addLog("撃破！", 'system');
        feverEnergy = Math.min(100, feverEnergy + 10);
    }
}

function updateGuage() {
    document.getElementById('fever-guage').style.width = feverEnergy + '%';
    document.getElementById('guage-val').innerText = feverEnergy;
    if (feverEnergy >= 100 && !isFever) {
        isFever = true;
        addLog("🔥 一斉射撃モード発動！射程+2", 'system');
    }
}

function endTurn() {
    selected = null;
    isFever = false;
    if (feverEnergy >= 100) feverEnergy = 0;
    updateGuage();

    units.forEach(u => {
        // 修理
        if ((u.y === 0 || u.y === 9) && (u.x >= 4 && u.x <= 5)) u.hp = Math.min(STATS.hp, u.hp + 5);
        u.acted = false;
    });

    turn = (turn === 'red') ? 'blue' : 'red';
    const status = document.getElementById('status');
    status.innerText = turn === 'red' ? "PLAYER TURN" : "ENEMY TURN";
    status.className = turn === 'red' ? "red-turn" : "blue-turn";
    
    render();
    if (turn === 'blue') setTimeout(aiTurn, 600);
}

function aiTurn() {
    const aiUnits = units.filter(u => u.team === 'blue');
    aiUnits.forEach((u, i) => {
        setTimeout(() => {
            if (!units.includes(u)) return;
            const targets = units.filter(t => t.team === 'red');
            let best = null, minDist = 99;

            targets.forEach(t => {
                const d = Math.abs(u.x - t.x) + Math.abs(u.y - t.y);
                if (d < minDist) { minDist = d; best = t; }
            });

            if (best) {
                if (minDist <= STATS.range) {
                    attack(u, best);
                } else {
                    // 他の戦車がいないマスへ移動
                    let nx = u.x, ny = u.y;
                    if (u.y < best.y) ny++;
                    else if (u.x < best.x) nx++;
                    else if (u.x > best.x) nx--;
                    
                    if (!units.some(other => other.x === nx && other.y === ny)) {
                        u.x = nx; u.y = ny;
                    }
                }
            }
            u.acted = true;
            render();
            if (i === aiUnits.length - 1) setTimeout(endTurn, 400);
        }, i * 150);
    });
}

function addLog(msg, type) {
    const log = document.getElementById('log');
    const d = document.createElement('div');
    d.style.color = type === 'red' ? 'var(--red)' : (type === 'blue' ? 'var(--blue)' : '#f1c40f');
    d.innerText = msg;
    log.prepend(d);
}

init();
</script>
</body>
</html>
